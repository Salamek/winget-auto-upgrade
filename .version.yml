GIT:
    AUTO_COMMIT: true
    AUTO_TAG: true
    AUTO_PUSH: true # false=disabled, true=enabled, 'remote_name'=enabled and push to remote_name
    COMMIT_MESSAGE: 'New version {version}'

REGEXPS:
    'wix': Version=\"(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)\"

VERSION_FILES:
    'windows/winget-auto-upgrade.wxs': 'wix'
